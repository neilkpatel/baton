<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="6 6 88 88">
  <!-- Baton menu-bar mark · COLOR variant of baton-drive. Relay runner in the app's
       palette (teal→sky→purple), baton tip in gold. Shipped with template=False so
       macOS renders the real colors instead of masking to monochrome. -->
  <defs>
    <linearGradient id="run" x1="14" y1="79" x2="88" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#run)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M60 33 L44 53" stroke-width="14"/>
    <path d="M44 53 L62 59 L60 79" stroke-width="11"/>
    <path d="M44 53 L27 61 L14 66" stroke-width="11"/>
    <path d="M57 37 L72 41 L79 52" stroke-width="8"/>
    <path d="M57 37 L45 34 L37 41" stroke-width="8"/>
  </g>
  <!-- the baton, reaching ahead — gold so it pops out of the runner -->
  <path d="M73 55 L88 47" fill="none" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
  <circle cx="64" cy="24" r="9" fill="url(#run)"/>
</svg>
